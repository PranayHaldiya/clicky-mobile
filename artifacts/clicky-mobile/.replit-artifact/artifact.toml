kind = "mobile"
previewPath = "/"
title = "Clicky Mobile"
version = "1.0.0"
id = "artifacts/clicky-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19112

[services.development]
run = "pnpm --filter @workspace/clicky-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clicky-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/clicky-mobile", "run", "serve" ]

[services.env]
PORT = "19112"
BASE_PATH = "/"
